<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>远程遥控</title>
    <style>
      :root {
        --text: #ffffff;
        --textMuted: rgba(255, 255, 255, 0.7);
        --line: rgba(255, 255, 255, 0.12);
        --panel: rgba(255, 255, 255, 0.1);
        --panel2: rgba(255, 255, 255, 0.15);
        --panel3: rgba(0, 0, 0, 0.35);
        --chip: rgba(255, 255, 255, 0.1);
        --chip2: rgba(255, 255, 255, 0.3);
        --ink: #2d321e;
        --accent: #f0e6e1;
        --blue: #53e0ff;
        --danger: #ff5a5f;
        --safeTop: env(safe-area-inset-top, 0px);
        --safeBottom: env(safe-area-inset-bottom, 0px);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB',
          'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
        height: 100vh;
        overflow: hidden;
      }
      .screen {
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      body[data-tab='swipe'] .bg {
        background-image: radial-gradient(1200px 900px at 50% -15%, rgba(83, 224, 255, 0.35), transparent 60%),
          radial-gradient(900px 600px at 10% 5%, rgba(240, 230, 225, 0.16), transparent 55%),
          linear-gradient(180deg, #05060a 0%, #0b0c10 55%, #07080c 100%);
      }
      body[data-tab='single'] .bg {
        background-image: radial-gradient(1100px 750px at 50% -10%, rgba(240, 230, 225, 0.18), transparent 62%),
          radial-gradient(900px 650px at 20% 10%, rgba(83, 224, 255, 0.18), transparent 58%),
          linear-gradient(180deg, #06070b 0%, #0b0c10 58%, #06070b 100%);
      }
      .content {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: calc(var(--safeTop) + 10px) 16px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .headerTitle {
        margin: 0;
        flex: 1;
        font-size: 20px;
        font-weight: 600;
        text-align: center;
      }
      .headerLeft,
      .headerRight {
        width: 92px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .headerLeft {
        justify-content: flex-start;
      }
      .headerRight {
        justify-content: flex-end;
      }
      .iconBtn {
        width: 40px;
        height: 40px;
        border-radius: 20px;
        background: var(--chip2);
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
      .iconBtn.subtle {
        background: var(--chip);
      }
      .iconBtn:active {
        transform: scale(0.99);
      }
      .iconSvg {
        width: 22px;
        height: 22px;
        display: block;
      }
      .tabBarWrap {
        padding: 12px 16px 0;
      }
      .tabBar {
        display: flex;
        position: relative;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        overflow: hidden;
      }
      .tabBar .indicator {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 50%;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(0%);
        transition: transform 180ms ease;
      }
      body[data-tab='single'] .tabBar .indicator {
        transform: translateX(100%);
      }
      .tabBtn {
        flex: 1;
        padding: 12px 10px;
        text-align: center;
        font-size: 16px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.7);
        user-select: none;
        position: relative;
        z-index: 1;
      }
      .tabBtn.active {
        color: #ffffff;
      }
      .main {
        flex: 1;
        min-height: 0;
        padding: 16px 16px calc(14px + var(--safeBottom));
        display: flex;
        flex-direction: column;
      }
      .hintLine {
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        line-height: 20px;
        text-align: center;
        margin: 0 0 10px 0;
      }
      .controlArea {
        flex: 1;
        min-height: 0;
        position: relative;
        display: flex;
        align-items: stretch;
        justify-content: center;
      }
      .gestureArea {
        flex: 1;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        position: relative;
        overflow: hidden;
        touch-action: none;
      }
      .gestureBeam {
        position: absolute;
        inset: 0;
        background: radial-gradient(600px 380px at 50% 55%, rgba(83, 224, 255, 0.22), transparent 60%),
          radial-gradient(520px 340px at 50% 30%, rgba(240, 230, 225, 0.14), transparent 62%);
        opacity: 0.9;
      }
      .gestureGuide {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 18px;
        text-align: center;
        pointer-events: none;
      }
      .guideTitle {
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
      }
      .guideText {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
        line-height: 20px;
      }
      .touchGlow {
        position: absolute;
        width: 140px;
        height: 140px;
        border-radius: 999px;
        transform: translate(-70px, -70px);
        pointer-events: none;
        background: radial-gradient(circle at 50% 50%, rgba(83, 224, 255, 0.35), rgba(83, 224, 255, 0) 65%);
        opacity: 0;
        transition: opacity 120ms ease;
      }
      .touchGlow.on {
        opacity: 1;
      }
      .rightPanel {
        width: 74px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-left: 12px;
        pointer-events: none;
      }
      .meter {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        justify-content: flex-end;
        gap: 12px;
      }
      .meterSeg {
        height: 12px;
        border-radius: 6px;
        width: 48px;
        background: rgba(255, 255, 255, 0.25);
      }
      .meterSeg.on {
        background: var(--accent);
      }
      .boostBtn {
        width: 56px;
        height: 56px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(240, 230, 225, 0.92), rgba(83, 224, 255, 0.65));
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        user-select: none;
      }
      .boostBtn:active {
        transform: scale(0.99);
      }
      .boostBtn span {
        font-size: 11px;
        font-weight: 700;
        color: var(--ink);
        text-align: center;
        line-height: 14px;
      }
      .statusBar {
        margin-top: 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.28);
        padding: 10px 12px;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .statusText {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.9);
        word-break: break-all;
        line-height: 16px;
      }
      .statusActions {
        display: flex;
        gap: 10px;
        flex-shrink: 0;
      }
      .miniBtn {
        padding: 7px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.1);
        font-size: 12px;
        font-weight: 600;
        color: #ffffff;
        user-select: none;
      }
      .miniBtn:active {
        transform: scale(0.99);
      }
      .miniBtn.danger {
        background: rgba(255, 90, 95, 0.18);
        border-color: rgba(255, 90, 95, 0.32);
      }
      .singleScroll {
        flex: 1;
        min-height: 0;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 6px;
      }
      .sectionTitle {
        margin: 12px 0 10px;
        font-size: 16px;
        font-weight: 700;
        color: #ffffff;
      }
      .variantGrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .variantCard {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        height: 132px;
        position: relative;
        overflow: hidden;
        user-select: none;
      }
      .variantCard.active {
        border-color: rgba(240, 230, 225, 0.65);
        background: rgba(240, 230, 225, 0.12);
      }
      .variantBg {
        position: absolute;
        inset: 0;
        background: radial-gradient(120px 120px at 75% 30%, rgba(83, 224, 255, 0.28), transparent 60%),
          radial-gradient(160px 160px at 25% 70%, rgba(240, 230, 225, 0.18), transparent 62%);
        opacity: 0.9;
      }
      .variantLabel {
        position: absolute;
        left: 12px;
        bottom: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .variantName {
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
      }
      .playBadge {
        width: 34px;
        height: 34px;
        border-radius: 17px;
        background: rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .playBadge svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modal.on {
        display: flex;
      }
      .modalCard {
        width: 100%;
        max-width: 520px;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        background: rgba(255, 255, 255, 0.9);
        color: #2d321e;
      }
      .modalCardBg {
        position: absolute;
        inset: 0;
        background: radial-gradient(900px 600px at 50% -10%, rgba(83, 224, 255, 0.22), transparent 62%),
          linear-gradient(135deg, rgba(229, 229, 229, 0.72), rgba(229, 229, 229, 0.36));
      }
      .modalInner {
        position: relative;
        padding: 18px 16px 18px;
      }
      .modalHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .modalHeader .title {
        font-size: 18px;
        font-weight: 800;
        text-align: center;
        flex: 1;
      }
      .modalClose {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }
      .modalBody {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        text-align: center;
      }
      .tipHero {
        width: 100%;
        height: 150px;
        border-radius: 14px;
        background: radial-gradient(260px 160px at 50% 50%, rgba(83, 224, 255, 0.35), rgba(83, 224, 255, 0) 60%),
          radial-gradient(260px 160px at 35% 65%, rgba(240, 230, 225, 0.26), rgba(240, 230, 225, 0) 62%);
      }
      .tipTitle {
        font-size: 16px;
        font-weight: 800;
        line-height: 24px;
      }
      .tipLine {
        font-size: 14px;
        line-height: 22px;
        color: #2d321e;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      }
    </style>
  </head>
  <body data-tab="swipe">
    <div class="screen">
      <div class="bg"></div>
      <div class="content">
        <div class="header">
          <div class="headerLeft">
            <div class="iconBtn subtle" id="btnBack" aria-label="back">
              <svg class="iconSvg" viewBox="0 0 24 24" fill="none">
                <path d="M14.5 5L8 11.5L14.5 18" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
          </div>
          <div class="headerTitle" id="headerTitle">滑屏使用</div>
          <div class="headerRight">
            <div class="iconBtn" id="btnSpray" aria-label="stop">
              <svg class="iconSvg" viewBox="0 0 24 24" fill="none">
                <path d="M12 3C9.2 3 7 5.2 7 8V9H17V8C17 5.2 14.8 3 12 3Z" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 9H17V14C17 16.8 14.8 19 12 19C9.2 19 7 16.8 7 14V9Z" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="iconBtn" id="btnHelp" aria-label="help">
              <svg class="iconSvg" viewBox="0 0 24 24" fill="none">
                <path d="M12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22Z" stroke="#FFFFFF" stroke-width="2"/>
                <path d="M9.09 9C9.325 8.331 9.789 7.766 10.4 7.405C11.011 7.044 11.728 6.91 12.428 7.027C13.128 7.144 13.766 7.505 14.229 8.044C14.692 8.583 14.95 9.265 14.96 9.975C14.96 12 12 12.75 12 12.75" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 17H12.01" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="tabBarWrap">
          <div class="tabBar" role="tablist">
            <div class="indicator" aria-hidden="true"></div>
            <div class="tabBtn active" role="tab" data-tab="swipe">滑屏使用</div>
            <div class="tabBtn" role="tab" data-tab="single">单次模式</div>
          </div>
        </div>

        <div class="main" id="pageSwipe">
          <p class="hintLine" id="swipeHint">一指滑动，最高40％动力；双指滑动，最高70％动力；三指滑动，可达100%动力</p>
          <div class="controlArea">
            <div class="gestureArea" id="gestureArea">
              <div class="gestureBeam"></div>
              <div class="touchGlow" id="touchGlow"></div>
              <div class="gestureGuide" id="gestureGuide">
                <div class="guideTitle">滑动控制</div>
                <div class="guideText">按住并上下滑动，松手自动停止</div>
              </div>
            </div>
            <div class="rightPanel">
              <div class="meter" id="meter"></div>
              <div class="boostBtn" id="btnBoost"><span>一键<br />加速</span></div>
            </div>
          </div>
          <div class="statusBar">
            <div class="statusText mono" id="statusSwipe"></div>
            <div class="statusActions">
              <div class="miniBtn danger" id="btnStop">停止</div>
            </div>
          </div>
        </div>

        <div class="main" id="pageSingle" style="display: none">
          <div class="singleScroll">
            <div class="sectionTitle">预设波形</div>
            <div class="variantGrid" id="modeGrid"></div>
          </div>
          <div class="statusBar">
            <div class="statusText mono" id="statusSingle"></div>
            <div class="statusActions">
              <div class="miniBtn danger" id="btnStopPlay">停止</div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal" id="tipsModal" role="dialog" aria-modal="true">
        <div class="modalCard">
          <div class="modalCardBg"></div>
          <div class="modalInner">
            <div class="modalHeader">
              <div style="width: 32px"></div>
              <div class="title">使用提示</div>
              <div class="modalClose" id="btnCloseTips" aria-label="close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                  <path d="M18 6L6 18" stroke="#2D321E" stroke-width="2" stroke-linecap="round" />
                  <path d="M6 6L18 18" stroke="#2D321E" stroke-width="2" stroke-linecap="round" />
                </svg>
              </div>
            </div>
            <div class="modalBody" id="tipsBody">
              <div class="tipHero"></div>
              <div class="tipTitle" id="tipTitle"></div>
              <div id="tipLines"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        function parseQuery(qs) {
          var q = {};
          if (!qs) return q;
          var s = qs.replace(/^\?/, '');
          if (!s) return q;
          s.split('&').forEach(function (pair) {
            var idx = pair.indexOf('=');
            var k = idx >= 0 ? pair.slice(0, idx) : pair;
            var v = idx >= 0 ? pair.slice(idx + 1) : '';
            try {
              q[decodeURIComponent(k)] = decodeURIComponent(v.replace(/\+/g, ' '));
            } catch (e) {
              q[k] = v;
            }
          });
          return q;
        }

        function uuid() {
          var d = Date.now();
          return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
            var r = ((d + Math.random() * 16) % 16) | 0;
            d = Math.floor(d / 16);
            return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
          });
        }

        var locationHref = String(window.location.href || '');
        var u = new URL(locationHref);
        var query = parseQuery(u.search);
        var token = String(query.token || '').trim();
        var baseURL = String(query.baseURL || u.origin || '').trim().replace(/\/+$/, '');

        var path = u.pathname || '/';
        var parts = path.split('/').filter(Boolean);
        var sessionId = '';
        if (parts[0] === 'remote-control' && parts[1]) {
          sessionId = decodeURIComponent(parts[1]);
        } else {
          sessionId = String(query.sessionId || '').trim();
        }

        function setStatus(el, text) {
          if (!el) return;
          el.textContent = text;
        }

        function buildCommandCandidates() {
          var encodedSession = encodeURIComponent(sessionId);
          return [
            {
              url: baseURL + '/api/remote-control/' + encodedSession + '/commands',
              body: function (cmd) {
                return JSON.stringify(cmd);
              },
            },
            {
              url: baseURL + '/api/remote-control/sessions/' + encodedSession + '/commands',
              body: function (cmd) {
                return JSON.stringify(cmd);
              },
            },
            {
              url: baseURL + '/api/remote-control/commands',
              body: function (cmd) {
                var withSession = Object.assign({ sessionId: sessionId }, cmd);
                return JSON.stringify(withSession);
              },
            },
          ];
        }

        function postJson(url, body) {
          return fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
              'X-Requested-With': 'XMLHttpRequest',
              'X-Remote-Control-Token': token,
            },
            body: body,
          }).then(function (res) {
            return res
              .text()
              .then(function (t) {
                var json = null;
                try {
                  json = t ? JSON.parse(t) : null;
                } catch (e) {
                  json = null;
                }
                return { status: res.status, ok: res.ok, json: json, text: t, url: url };
              })
              .catch(function () {
                return { status: res.status, ok: res.ok, json: null, text: '', url: url };
              });
          });
        }

        var lastCmdAt = 0;
        function sendBleStrength(percent0to100, statusEl) {
          var pct = Math.max(0, Math.min(100, Math.round(Number(percent0to100) || 0)));
          var cmd = {
            commandId: uuid(),
            type: 'ble_control',
            payload: { mode: 'strength', value: pct },
            ts: Date.now(),
          };
          var candidates = buildCommandCandidates();
          var i = 0;
          var body = '';
          function tryNext() {
            if (i >= candidates.length) {
              setStatus(statusEl, '发送失败：no_candidate');
              return Promise.resolve(false);
            }
            var c = candidates[i++];
            body = c.body(cmd);
            return postJson(c.url, body)
              .then(function (r) {
                if (r.ok && r.json && r.json.ok === true) return true;
                if (r.status === 404) return tryNext();
                if (r.status === 401 || r.status === 403) {
                  setStatus(statusEl, '未授权：token_invalid');
                  return false;
                }
                var hint = r.json && r.json.error ? String(r.json.error) : r.text ? String(r.text).slice(0, 120) : '';
                setStatus(statusEl, '发送失败：' + r.status + (hint ? ' ' + hint : ''));
                return false;
              })
              .catch(function (e) {
                setStatus(statusEl, '网络错误：' + (e && e.message ? e.message : String(e)));
                return false;
              });
          }
          return tryNext();
        }

        if (!baseURL || !sessionId || !token) {
          setStatus(document.getElementById('statusSwipe'), '参数缺失：baseURL/sessionId/token');
          setStatus(document.getElementById('statusSingle'), '参数缺失：baseURL/sessionId/token');
        }

        var headerTitle = document.getElementById('headerTitle');
        var tabs = Array.prototype.slice.call(document.querySelectorAll('.tabBtn'));
        var pageSwipe = document.getElementById('pageSwipe');
        var pageSingle = document.getElementById('pageSingle');
        var tipsModal = document.getElementById('tipsModal');
        var btnHelp = document.getElementById('btnHelp');
        var btnCloseTips = document.getElementById('btnCloseTips');
        var btnBack = document.getElementById('btnBack');
        var btnSpray = document.getElementById('btnSpray');

        var statusSwipe = document.getElementById('statusSwipe');
        var btnStop = document.getElementById('btnStop');
        var btnBoost = document.getElementById('btnBoost');
        var meter = document.getElementById('meter');
        var gestureArea = document.getElementById('gestureArea');
        var touchGlow = document.getElementById('touchGlow');
        var gestureGuide = document.getElementById('gestureGuide');

        var statusSingle = document.getElementById('statusSingle');
        var modeGrid = document.getElementById('modeGrid');
        var btnStopPlay = document.getElementById('btnStopPlay');

        function setBodyTab(next) {
          document.body.setAttribute('data-tab', next);
          tabs.forEach(function (t) {
            t.classList.toggle('active', t.getAttribute('data-tab') === next);
          });
          pageSwipe.style.display = next === 'swipe' ? '' : 'none';
          pageSingle.style.display = next === 'single' ? '' : 'none';
          headerTitle.textContent = next === 'swipe' ? '滑屏使用' : '模式探索';
        }

        var tipPages = [
          { title: '多指滑动', lines: ['一指滑动，最高40％动力', '双指滑动，最高70％动力', '三指滑动，可达100%动力'] },
          { title: '一键加速', lines: ['无需滑动，指尖轻点，瞬间唤醒深处炽热'] },
        ];
        var tipPageIndex = 0;
        function renderTipPage() {
          var title = document.getElementById('tipTitle');
          var lines = document.getElementById('tipLines');
          if (!title || !lines) return;
          title.textContent = tipPages[tipPageIndex].title;
          lines.innerHTML = '';
          tipPages[tipPageIndex].lines.forEach(function (t) {
            var div = document.createElement('div');
            div.className = 'tipLine';
            div.textContent = t;
            lines.appendChild(div);
          });
        }
        renderTipPage();

        btnHelp.addEventListener('click', function () {
          tipsModal.classList.add('on');
          renderTipPage();
        });
        btnCloseTips.addEventListener('click', function () {
          tipsModal.classList.remove('on');
        });
        tipsModal.addEventListener('click', function (e) {
          if (e.target === tipsModal) tipsModal.classList.remove('on');
        });
        document.getElementById('tipsBody').addEventListener('click', function () {
          tipPageIndex = (tipPageIndex + 1) % tipPages.length;
          renderTipPage();
        });

        btnBack.addEventListener('click', function () {
          try {
            history.back();
          } catch (e) {}
        });

        var meterSegs = [];
        for (var i = 0; i < 14; i++) {
          var seg = document.createElement('div');
          seg.className = 'meterSeg';
          seg.style.width = String(18 + i * 2) + 'px';
          meter.appendChild(seg);
          meterSegs.push(seg);
        }

        function setMeter(pct) {
          var activeCount = Math.round((pct / 100) * meterSegs.length);
          for (var i = 0; i < meterSegs.length; i++) {
            meterSegs[i].classList.toggle('on', i < activeCount);
          }
        }

        function maxPercentByFingers(count) {
          if (count >= 3) return 100;
          if (count === 2) return 70;
          return 40;
        }

        function setGlow(x, y, on) {
          touchGlow.style.left = x + 'px';
          touchGlow.style.top = y + 'px';
          touchGlow.classList.toggle('on', !!on);
          gestureGuide.style.opacity = on ? '0' : '1';
        }

        function pctFromPointerInArea(clientY, fingerCount) {
          var rect = gestureArea.getBoundingClientRect();
          var y = Math.max(0, Math.min(rect.height, clientY - rect.top));
          var raw = 100 - (y / rect.height) * 100;
          var cap = maxPercentByFingers(fingerCount);
          return Math.round(Math.max(0, Math.min(cap, raw)));
        }

        function maybeSend(pct) {
          var now = Date.now();
          if (now - lastCmdAt < 120) return;
          lastCmdAt = now;
          sendBleStrength(pct, statusSwipe).then(function (ok) {
            if (ok) setStatus(statusSwipe, '已发送 strength=' + Math.round(pct) + '%');
          });
        }

        var dragging = false;
        var activePointers = new Set();

        function onDown(e) {
          if (!baseURL || !sessionId || !token) return;
          dragging = true;
          if (e.pointerId != null) activePointers.add(e.pointerId);
          var fingerCount = e.touches ? e.touches.length : activePointers.size || 1;
          var y = e.touches && e.touches[0] ? e.touches[0].clientY : e.clientY;
          var x = e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX;
          var pct = pctFromPointerInArea(y, fingerCount);
          setGlow(x, y, true);
          setMeter(pct);
          maybeSend(pct);
        }

        function onMove(e) {
          if (!dragging) return;
          var fingerCount = e.touches ? e.touches.length : activePointers.size || 1;
          var y = e.touches && e.touches[0] ? e.touches[0].clientY : e.clientY;
          var x = e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX;
          var pct = pctFromPointerInArea(y, fingerCount);
          setGlow(x, y, true);
          setMeter(pct);
          maybeSend(pct);
        }

        function onUp() {
          if (!dragging) return;
          dragging = false;
          activePointers.clear();
          setGlow(0, 0, false);
          setMeter(0);
          sendBleStrength(0, statusSwipe).then(function (ok) {
            if (ok) setStatus(statusSwipe, '已停止');
          });
        }

        gestureArea.addEventListener('pointerdown', function (e) {
          try {
            gestureArea.setPointerCapture(e.pointerId);
          } catch (err) {}
          onDown(e);
        });
        gestureArea.addEventListener('pointermove', onMove);
        gestureArea.addEventListener('pointerup', function (e) {
          activePointers.delete(e.pointerId);
          onUp();
        });
        gestureArea.addEventListener('pointercancel', function (e) {
          activePointers.delete(e.pointerId);
          onUp();
        });
        gestureArea.addEventListener('touchstart', onDown, { passive: true });
        gestureArea.addEventListener('touchmove', onMove, { passive: true });
        window.addEventListener('touchend', onUp, { passive: true });

        btnStop.addEventListener('click', function () {
          onUp();
        });

        btnBoost.addEventListener('click', function () {
          if (!baseURL || !sessionId || !token) return;
          var pct = 85;
          setMeter(pct);
          sendBleStrength(pct, statusSwipe).then(function (ok) {
            if (ok) setStatus(statusSwipe, '一键加速 strength=' + pct + '%');
          });
        });

        var modes = [
          { key: 'breath', name: 'Breath' },
          { key: 'climb', name: 'Climb' },
          { key: 'rain', name: 'Rain' },
          { key: 'ripple', name: 'Ripple' },
          { key: 'tide', name: 'Tide' },
          { key: 'pulse', name: 'Pulse' },
        ];
        var waveformByKey = {};
        var activeModeKey = modes[3].key;
        var playTimer = null;
        var playIdx = 0;
        var isPlaying = false;

        function waveformValue(modeKey, idx) {
          var t = idx / 18;
          if (modeKey === 'breath') return Math.round((Math.sin(t) * 0.5 + 0.5) * 55 + 15);
          if (modeKey === 'climb') return Math.round(Math.min(1, (idx % 90) / 90) * 80 + 10);
          if (modeKey === 'rain') return 45 + Math.round(Math.sin(t * 3) * 18);
          if (modeKey === 'tide') return Math.round((Math.sin(t * 0.7) * 0.5 + 0.5) * 70 + 10);
          if (modeKey === 'pulse') return idx % 14 < 2 ? 85 : 18;
          return 40 + Math.round(Math.sin(t * 1.6) * 25);
        }

        function buildModeExploreCandidates() {
          var encodedSession = encodeURIComponent(sessionId);
          return [
            baseURL + '/api/remote-control/' + encodedSession + '/mode-explore',
            baseURL + '/api/remote-control/sessions/' + encodedSession + '/mode-explore',
          ];
        }

        function getJson(url) {
          return fetch(url, {
            method: 'GET',
            headers: {
              Accept: 'application/json',
              'X-Requested-With': 'XMLHttpRequest',
              'X-Remote-Control-Token': token,
            },
          }).then(function (res) {
            return res.text().then(function (text) {
              var json = null;
              try {
                json = text ? JSON.parse(text) : null;
              } catch (err) {}
              return { status: res.status, json: json, text: text };
            });
          });
        }

        function pickCategoriesFromResponse(body) {
          if (!body || typeof body !== 'object') return null;
          var data = null;
          if (body.ok === true) data = body.data;
          else if (body.success === true) data = body.data;
          else if (body.data && body.data.ok === true) data = body.data.data;
          if (!data || typeof data !== 'object') return null;
          var categories = data.categories;
          return Array.isArray(categories) ? categories : null;
        }

        function applyRemoteModes(categories) {
          var list = [];
          var byKey = {};
          (categories || []).forEach(function (cat) {
            (cat && Array.isArray(cat.waveforms) ? cat.waveforms : []).forEach(function (wf) {
              var key = wf && (wf.id || wf._id || wf.name) ? String(wf.id || wf._id || wf.name).trim() : '';
              if (!key || byKey[key]) return;
              var name = wf && wf.name ? String(wf.name) : key;
              list.push({ key: key, name: name });
              byKey[key] = wf;
            });
          });
          if (list.length === 0) return false;
          modes = list;
          waveformByKey = byKey;
          activeModeKey = modes[0].key;
          return true;
        }

        function loadRemoteModes() {
          if (!baseURL || !sessionId || !token) return Promise.resolve(false);
          var candidates = buildModeExploreCandidates();
          function tryNext(i) {
            if (i >= candidates.length) return Promise.resolve(false);
            return getJson(candidates[i])
              .then(function (r) {
                if (r.status === 401 || r.status === 403) return false;
                var categories = pickCategoriesFromResponse(r.json);
                if (!categories) return tryNext(i + 1);
                return applyRemoteModes(categories);
              })
              .catch(function () {
                return tryNext(i + 1);
              });
          }
          return tryNext(0);
        }

        function getActiveSequence() {
          var wf = waveformByKey ? waveformByKey[activeModeKey] : null;
          var seq = wf && wf.sequence && typeof wf.sequence === 'object' ? wf.sequence : null;
          var channels = seq && Array.isArray(seq.channels) ? seq.channels : [];
          var first = channels[0] && typeof channels[0] === 'object' ? channels[0] : null;
          var values = first && Array.isArray(first.values) ? first.values : null;
          var tickMs = Number(seq && seq.tickMs ? seq.tickMs : wf && wf.tickMs ? wf.tickMs : 0) || 0;
          if (!values || values.length === 0) return null;
          return { values: values, tickMs: tickMs > 0 ? tickMs : 80, loop: seq ? seq.loop !== false : true };
        }

        function stopPlay() {
          if (playTimer) {
            clearInterval(playTimer);
            playTimer = null;
          }
          playIdx = 0;
          isPlaying = false;
          sendBleStrength(0, statusSingle).then(function (ok) {
            if (ok) setStatus(statusSingle, '已停止');
          });
        }

        function startPlay() {
          if (!baseURL || !sessionId || !token) return;
          if (playTimer) return;
          isPlaying = true;
          var wf = waveformByKey ? waveformByKey[activeModeKey] : null;
          var displayName = wf && wf.name ? String(wf.name) : activeModeKey;
          setStatus(statusSingle, '播放中 mode=' + displayName);
          playIdx = 0;
          var seq = getActiveSequence();
          var tickMs = seq ? Math.max(40, Math.min(500, Number(seq.tickMs) || 80)) : 160;
          playTimer = setInterval(function () {
            var v = 0;
            if (seq) {
              if (playIdx >= seq.values.length) {
                if (seq.loop) playIdx = 0;
                else {
                  stopPlay();
                  renderModes();
                  return;
                }
              }
              v = Number(seq.values[playIdx++]);
              if (!Number.isFinite(v)) v = 0;
              v = Math.max(0, Math.min(100, Math.floor(v)));
            } else {
              v = waveformValue(activeModeKey, playIdx++);
            }
            sendBleStrength(v, statusSingle).then(function (ok) {
              if (ok) setStatus(statusSingle, '播放中 mode=' + displayName + ' strength=' + v + '%');
            });
          }, tickMs);
        }

        function renderModes() {
          modeGrid.innerHTML = '';
          modes.forEach(function (m) {
            var div = document.createElement('div');
            div.className = 'variantCard' + (m.key === activeModeKey ? ' active' : '');
            var bg = document.createElement('div');
            bg.className = 'variantBg';
            var wf = waveformByKey ? waveformByKey[m.key] : null;
            var img = wf && (wf.waveImage || wf.wave_image || wf.image) ? String(wf.waveImage || wf.wave_image || wf.image).trim() : '';
            if (img) {
              bg.style.backgroundImage =
                'linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.5)), url("' + img.replace(/"/g, '\\"') + '")';
              bg.style.backgroundSize = 'cover';
              bg.style.backgroundPosition = 'center';
            }
            var label = document.createElement('div');
            label.className = 'variantLabel';
            var name = document.createElement('div');
            name.className = 'variantName';
            name.textContent = m.name;
            var badge = document.createElement('div');
            badge.className = 'playBadge';
            badge.innerHTML =
              '<svg viewBox="0 0 24 24" fill="none">' +
              (m.key === activeModeKey && isPlaying
                ? '<path d="M7 6H10V18H7V6Z" fill="#F0E6E1"/><path d="M14 6H17V18H14V6Z" fill="#F0E6E1"/>'
                : '<path d="M9 7L18 12L9 17V7Z" fill="#FFFFFF"/>') +
              '</svg>';
            label.appendChild(name);
            label.appendChild(badge);
            div.appendChild(bg);
            div.appendChild(label);
            div.addEventListener('click', function () {
              if (activeModeKey === m.key) {
                if (isPlaying) stopPlay();
                else startPlay();
              } else {
                activeModeKey = m.key;
                stopPlay();
                startPlay();
              }
              renderModes();
            });
            modeGrid.appendChild(div);
          });
        }
        renderModes();
        loadRemoteModes().then(function (updated) {
          if (!updated) return;
          if (playTimer) stopPlay();
          renderModes();
        });

        btnStopPlay.addEventListener('click', function () {
          stopPlay();
          renderModes();
        });

        tabs.forEach(function (t) {
          t.addEventListener('click', function () {
            stopPlay();
            renderModes();
            setBodyTab(t.getAttribute('data-tab'));
          });
        });

        btnSpray.addEventListener('click', function () {
          if (document.body.getAttribute('data-tab') === 'single') {
            stopPlay();
            renderModes();
          } else {
            onUp();
          }
        });

        window.addEventListener('pagehide', function () {
          stopPlay();
        });

        setMeter(0);
      })();
    </script>
  </body>
</html>
